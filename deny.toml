# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Run locally: cargo deny --manifest-path src-tauri/Cargo.toml check

[advisories]
version = 2
yanked = "warn"
ignore = []

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
version = 2
# Permissive licenses only — avoid GPL/AGPL copyleft (PRD §9.1).
# NOTE: a few crates (e.g. `ring`) ship a custom license file and need a
# `[[licenses.clarify]]` entry (the expected file hash is printed on the first
# `cargo deny check licenses` run). Add those, then enable `licenses` in CI.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "BSL-1.0",
]
confidence-threshold = 0.8
