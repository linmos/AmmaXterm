name: Release

# Tag a release to build installers for all three platforms and publish a
# draft GitHub Release (D8 / §9.3). Example: `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ['v*']

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Pull the section for this tag out of CHANGELOG.md so the GitHub Release
      # (and the updater's latest.json `notes`) shows the actual changes instead
      # of being blank. Runs under Git Bash on the Windows runner too.
      - name: Extract changelog notes for this release
        id: changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { if (started || $0 != "") { started = 1; print } }
          ' CHANGELOG.md)"
          if [ -z "$notes" ]; then
            notes="See CHANGELOG.md for the full list of changes."
          fi
          {
            echo "notes<<__CHANGELOG_EOF__"
            echo "$notes"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — produces the .sig files and latest.json the
          # in-app updater verifies against the embedded public key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: AmmaXterm ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
